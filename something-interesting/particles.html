<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Particle Playground</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0d1117; overflow: hidden; height: 100%; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    #hud {
      position: fixed; top: 12px; left: 14px;
      font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #8b949e; user-select: none; pointer-events: none;
    }
    #hud b { color: #58a6ff; }
  </style>
</head>
<body>
  <div id="hud">Particles: <b id="count">0</b> &nbsp;|&nbsp; click / drag to launch</div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const countEl = document.getElementById('count');
    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth * devicePixelRatio;
      H = canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    const GRAVITY = 0.25 * devicePixelRatio;
    const BOUNCE = 0.72;
    const FRICTION = 0.99;
    const MAX = 600;
    const particles = [];
    const palette = ['#58a6ff', '#79c0ff', '#d2a8ff', '#56d364', '#ffa657', '#f778ba'];

    function spawn(x, y, vx, vy) {
      if (particles.length >= MAX) particles.shift();
      particles.push({
        x, y, vx, vy,
        r: (2 + Math.random() * 4) * devicePixelRatio,
        life: 1,
        color: palette[(Math.random() * palette.length) | 0]
      });
    }

    function pointer(e) {
      const rect = canvas.getBoundingClientRect();
      const px = (e.clientX - rect.left) * devicePixelRatio;
      const py = (e.clientY - rect.top) * devicePixelRatio;
      const vx = (Math.random() - 0.5) * 8 * devicePixelRatio;
      const vy = (Math.random() - 0.5) * 8 * devicePixelRatio - 2 * devicePixelRatio;
      spawn(px, py, vx, vy);
    }

    let dragging = false;
    canvas.addEventListener('mousedown', e => { dragging = true; pointer(e); });
    canvas.addEventListener('mousemove', e => { if (dragging) pointer(e); });
    window.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); pointer(e.touches[0]); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); pointer(e.touches[0]); }, { passive: false });

    function tick() {
      ctx.fillStyle = 'rgba(13, 17, 23, 0.18)';
      ctx.fillRect(0, 0, W, H);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.vy += GRAVITY;
        p.vx *= FRICTION;
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < p.r) { p.x = p.r; p.vx *= -BOUNCE; }
        if (p.x > W - p.r) { p.x = W - p.r; p.vx *= -BOUNCE; }
        if (p.y > H - p.r) { p.y = H - p.r; p.vy *= -BOUNCE; p.vx *= FRICTION; }
        if (p.y < p.r) { p.y = p.r; p.vy *= -BOUNCE; }
        p.life -= 0.004;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      countEl.textContent = particles.length;
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
