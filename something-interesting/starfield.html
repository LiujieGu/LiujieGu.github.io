<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starfield</title>
  <style>
    html, body { margin: 0; padding: 0; background: #05070d; overflow: hidden; height: 100%; }
    canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }
    #hud {
      position: fixed; top: 12px; left: 14px;
      font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #6b7a99; user-select: none; pointer-events: none;
    }
    #hud b { color: #9ecbff; }
  </style>
</head>
<body>
  <div id="hud">Starfield &nbsp;|&nbsp; move mouse to shift the view</div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;
    const DPR = Math.min(devicePixelRatio || 1, 2);

    function resize() {
      const rect = canvas.getBoundingClientRect();
      W = canvas.width = Math.max(1, Math.round(rect.width * DPR));
      H = canvas.height = Math.max(1, Math.round(rect.height * DPR));
      cx = W / 2; cy = H / 2;
    }
    resize();
    if (window.ResizeObserver) new ResizeObserver(resize).observe(canvas);
    else window.addEventListener('resize', resize);

    // 3D star field projected to 2D
    const NUM = 900;
    const stars = [];
    function rand(a, b) { return a + Math.random() * (b - a); }
    for (let i = 0; i < NUM; i++) {
      stars.push({
        x: rand(-1, 1), y: rand(-1, 1), z: rand(0.05, 1),
        r: rand(0.4, 1.6), tw: rand(0, Math.PI * 2), ts: rand(0.01, 0.04)
      });
    }

    let mx = 0, my = 0, tmx = 0, tmy = 0;
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      tmx = (e.clientX - rect.left) / rect.width - 0.5;
      tmy = (e.clientY - rect.top) / rect.height - 0.5;
    });

    const FOV = 0.9;
    let angle = 0;

    function tick() {
      ctx.fillStyle = 'rgba(5, 7, 13, 0.35)';
      ctx.fillRect(0, 0, W, H);
      mx += (tmx - mx) * 0.08;
      my += (tmy - my) * 0.08;
      angle += 0.0003;

      const ca = Math.cos(angle), sa = Math.sin(angle);
      const panX = mx * W * 0.55, panY = my * H * 0.55;

      for (const s of stars) {
        s.tw += s.ts;
        // rotate around z axis slowly, add depth drift
        let rx = s.x * ca - s.y * sa;
        let ry = s.x * sa + s.y * ca;
        const depth = s.z + 0.02;
        s.z = depth > 1 ? 0.05 : depth;
        const k = FOV / s.z;
        const px = cx + rx * k * W * 0.5 + panX;
        const py = cy + ry * k * H * 0.5 + panY;
        if (px < 0 || px > W || py < 0 || py > H) continue;
        const size = s.r * k * DPR;
        const tw = 0.55 + 0.45 * Math.sin(s.tw);
        ctx.globalAlpha = Math.min(1, tw * (1.4 - s.z));
        ctx.fillStyle = s.z < 0.3 ? '#9ecbff' : (s.z < 0.6 ? '#ffffff' : '#41577a');
        ctx.beginPath();
        ctx.arc(px, py, Math.max(0.3, size), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
