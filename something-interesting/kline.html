<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Random Walk K-Line</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0d1117; overflow: hidden; height: 100%; }
    canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
    #hud {
      position: fixed; top: 12px; left: 14px;
      font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #8b949e; user-select: none; pointer-events: none;
    }
    #hud b { color: #58a6ff; }
  </style>
</head>
<body>
  <div id="hud">Random-Walk K-Line &nbsp;|&nbsp; price: <b id="px">--</b> &nbsp; ret: <b id="ret">--</b></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const pxEl = document.getElementById('px');
    const retEl = document.getElementById('ret');
    const DPR = Math.min(devicePixelRatio || 1, 2);
    let W, H;
    function resize() {
      const rect = canvas.getBoundingClientRect();
      W = canvas.width = Math.max(1, Math.round(rect.width * DPR));
      H = canvas.height = Math.max(1, Math.round(rect.height * DPR));
    }
    resize();
    if (window.ResizeObserver) new ResizeObserver(resize).observe(canvas);
    else window.addEventListener('resize', resize);

    const N = 80;            // visible candles
    const STEP = 8 * DPR;    // candle width + gap
    const basePrice = 100;
    let price = basePrice;
    const candles = [];      // {o,h,l,c}
    function newCandle() {
      const o = price;
      // gaussian-ish random walk
      const drift = (Math.random() - 0.5) * 2.4;
      const vol = 0.6 + Math.random() * 1.8;
      let c = o + drift * vol;
      const h = Math.max(o, c) + Math.random() * vol;
      const l = Math.min(o, c) - Math.random() * vol;
      price = c;
      return { o, h, l, c };
    }
    for (let i = 0; i < N; i++) candles.push(newCandle());

    function draw() {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, W, H);

      // price range
      let hi = -Infinity, lo = Infinity;
      for (const k of candles) { hi = Math.max(hi, k.h); lo = Math.min(lo, k.l); }
      const pad = (hi - lo) * 0.1 + 0.001;
      hi += pad; lo -= pad;
      const plotH = H * 0.86, top = H * 0.07;
      const yOf = p => top + (1 - (p - lo) / (hi - lo)) * plotH;

      // grid
      ctx.strokeStyle = 'rgba(139,148,158,0.12)';
      ctx.lineWidth = 1;
      for (let g = 0; g <= 4; g++) {
        const y = top + plotH * g / 4;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      const startX = W - candles.length * STEP;
      candles.forEach((k, i) => {
        const x = startX + i * STEP;
        const up = k.c >= k.o;
        const col = up ? '#26a69a' : '#ef5350';
        // wick
        ctx.strokeStyle = col;
        ctx.lineWidth = 1 * DPR;
        ctx.beginPath();
        ctx.moveTo(x + STEP * 0.35, yOf(k.h));
        ctx.lineTo(x + STEP * 0.35, yOf(k.l));
        ctx.stroke();
        // body
        const yo = yOf(k.o), yc = yOf(k.c);
        const bh = Math.max(1 * DPR, Math.abs(yc - yo));
        ctx.fillStyle = col;
        ctx.fillRect(x, Math.min(yo, yc), STEP * 0.7, bh);
      });

      const last = candles[candles.length - 1].c;
      pxEl.textContent = last.toFixed(2);
      const r = (last / basePrice - 1) * 100;
      retEl.textContent = (r >= 0 ? '+' : '') + r.toFixed(2) + '%';
      retEl.style.color = r >= 0 ? '#26a69a' : '#ef5350';
    }

    function step() {
      candles.push(newCandle());
      if (candles.length > N) candles.shift();
      draw();
    }
    draw();
    setInterval(step, 600);
  </script>
</body>
</html>
