<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Random Walk K-Line</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0d1117; overflow: hidden; height: 100%; }
    canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(devicePixelRatio || 1, 2);
    let W, H;
    function resize() {
      const rect = canvas.getBoundingClientRect();
      W = canvas.width = Math.max(1, Math.round(rect.width * DPR));
      H = canvas.height = Math.max(1, Math.round(rect.height * DPR));
    }
    resize();
    if (window.ResizeObserver) new ResizeObserver(resize).observe(canvas);
    else window.addEventListener('resize', resize);

    const N = 80;
    const basePrice = 100;
    let price = basePrice;
    const candles = [];
    function newCandle() {
      const o = price;
      const drift = (Math.random() - 0.5) * 2.4;
      const vol = 0.6 + Math.random() * 1.8;
      let c = o + drift * vol;
      const h = Math.max(o, c) + Math.random() * vol;
      const l = Math.min(o, c) - Math.random() * vol;
      price = c;
      return { o, h, l, c };
    }
    for (let i = 0; i < N; i++) candles.push(newCandle());

    function draw() {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, W, H);

      let hi = -Infinity, lo = Infinity;
      for (const k of candles) { hi = Math.max(hi, k.h); lo = Math.min(lo, k.l); }
      const pad = (hi - lo) * 0.1 + 0.001;
      hi += pad; lo -= pad;
      const plotTop = H * 0.10, plotH = H * 0.80;
      const yOf = p => plotTop + (1 - (p - lo) / (hi - lo)) * plotH;

      // grid + price labels
      ctx.font = (12 * DPR) + 'px ui-monospace, Menlo, monospace';
      ctx.textBaseline = 'middle';
      for (let g = 0; g <= 4; g++) {
        const y = plotTop + plotH * g / 4;
        ctx.strokeStyle = 'rgba(139,148,158,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        const pv = hi - (hi - lo) * g / 4;
        ctx.fillStyle = '#6b7a99';
        ctx.fillText(pv.toFixed(1), 8 * DPR, y);
      }

      const STEP = Math.min(10 * DPR, W / (N + 2));
      const totalW = candles.length * STEP;
      const startX = Math.max(0, (W - totalW) / 2);
      candles.forEach((k, i) => {
        const x = startX + i * STEP;
        const up = k.c >= k.o;
        const col = up ? '#26a69a' : '#ef5350';
        ctx.strokeStyle = col;
        ctx.lineWidth = 1 * DPR;
        ctx.beginPath();
        ctx.moveTo(x + STEP * 0.5, yOf(k.h));
        ctx.lineTo(x + STEP * 0.5, yOf(k.l));
        ctx.stroke();
        const yo = yOf(k.o), yc = yOf(k.c);
        const bh = Math.max(1 * DPR, Math.abs(yc - yo));
        ctx.fillStyle = col;
        ctx.fillRect(x + STEP * 0.15, Math.min(yo, yc), STEP * 0.7, bh);
      });

      // HUD drawn on canvas (avoids iframe DOM layering issues)
      const last = candles[candles.length - 1].c;
      const r = (last / basePrice - 1) * 100;
      const up = r >= 0;
      ctx.textBaseline = 'top';
      ctx.font = (13 * DPR) + 'px ui-monospace, Menlo, monospace';
      ctx.fillStyle = '#8b949e';
      ctx.fillText('Random-Walk K-Line', 10 * DPR, 10 * DPR);
      ctx.fillStyle = up ? '#26a69a' : '#ef5350';
      ctx.fillText('price ' + last.toFixed(2) + '   ret ' + (up ? '+' : '') + r.toFixed(2) + '%',
                   10 * DPR, 30 * DPR);
    }

    function step() {
      candles.push(newCandle());
      if (candles.length > N) candles.shift();
      draw();
    }
    draw();
    setInterval(step, 600);
  </script>
</body>
</html>
